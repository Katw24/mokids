<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mosaicos</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e8e4de;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Peças arrastáveis */
        .image {
            position: absolute;
            cursor: grab;
            user-select: none;
            transition: box-shadow 0.2s ease;
        }

        .image:active {
            cursor: grabbing;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .image img {
            display: block;
            pointer-events: none;
        }

        /* Botão de rotação */
        .rotation-btn {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background-color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 99;
        }

        .image:hover .rotation-btn {
            opacity: 1;
        }

        .rotation-btn:hover {
            transform: rotate(30deg);
            background-color: #fff;
        }

        /* Imagem central fixa */
        .fixed-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Painel de preview (canto superior direito) */
        .preview-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background-color: #fff;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            z-index: 1000;
        }

        .preview-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botão de navegação */
        .nav-btn {
            position: fixed;
            right: 20px;
            bottom: 24px;
            z-index: 1000;
            opacity: 0.85;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .nav-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .nav-btn img {
            display: block;
            width: 48px;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Pontos magnéticos -->
    <div class="magnetic-point" data-x="76"  data-y="81"></div>
    <div class="magnetic-point" data-x="189" data-y="81"></div>
    <div class="magnetic-point" data-x="301" data-y="81"></div>
    <div class="magnetic-point" data-x="76"  data-y="195"></div>
    <div class="magnetic-point" data-x="189" data-y="195"></div>
    <div class="magnetic-point" data-x="301" data-y="195"></div>
    <div class="magnetic-point" data-x="76"  data-y="308"></div>
    <div class="magnetic-point" data-x="189" data-y="308"></div>
    <div class="magnetic-point" data-x="301" data-y="308"></div>

    <div class="container">

        <!-- Tabuleiro fixo central -->
        <div class="fixed-image">
            <img src="./mosaicos/tab.png" style="width: 495px;">
        </div>

        <!-- Grupo 1: peças brancas/vermelhas -->
        <div class="image group-1" style="top: 100px; left: 100px; z-index: 1;"><img src="./mosaicos/am.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-1" style="top: 120px; left: 110px; z-index: 2;"><img src="./mosaicos/am.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-1" style="top: 100px; left: 100px; z-index: 1;"><img src="./mosaicos/am.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-1" style="top: 120px; left: 110px; z-index: 2;"><img src="./mosaicos/am.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>

        <!-- Grupo 2: peças verdes/roxas -->
        <div class="image group-2" style="top: 100px; left: 309px; z-index: 1;"><img src="./mosaicos/vr.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-2" style="top: 117px; left: 319px; z-index: 2;"><img src="./mosaicos/vr.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-2" style="top: 100px; left: 309px; z-index: 1;"><img src="./mosaicos/vr.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-2" style="top: 117px; left: 319px; z-index: 2;"><img src="./mosaicos/vr.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-2" style="top: 100px; left: 309px; z-index: 1;"><img src="./mosaicos/vr.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>

        <!-- Grupo 3: peças azuis/amarlas -->
        <div class="image group-3" style="top: 283px; left: 103px; z-index: 1;"><img src="./mosaicos/vmam.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-3" style="top: 303px; left: 113px; z-index: 2;"><img src="./mosaicos/vmam.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-3" style="top: 283px; left: 103px; z-index: 1;"><img src="./mosaicos/vmam.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
        <div class="image group-3" style="top: 303px; left: 113px; z-index: 2;"><img src="./mosaicos/vmam.png"><button class="rotation-btn" aria-label="Girar">↻</button></div>
    </div>

    <!-- Preview -->
    <div class="preview-panel">
        <img src="./imagens/9.png" alt="Referência">
    </div>

    <!-- Próximo -->
    <a class="nav-btn" href="./a10.html" aria-label="Próxima página">
        <img src="./mosaicos/botao.png" alt="Próximo">
    </a>

    <script>
        let zIndexCounter = 10;
        let currentDragged = null;
        let offsetX = 0;
        let offsetY = 0;

        function snapToMagnet(image) {
            const threshold = 30;
            const imgRect = image.getBoundingClientRect();
            const tabRect = document.querySelector('.fixed-image img').getBoundingClientRect();

            document.querySelectorAll('.magnetic-point').forEach(point => {
                const mx = tabRect.left + parseInt(point.dataset.x);
                const my = tabRect.top  + parseInt(point.dataset.y);
                const dist = Math.hypot(imgRect.left - mx, imgRect.top - my);

                if (dist < threshold) {
                    image.style.transition = 'left 0.15s ease, top 0.15s ease';
                    image.style.left = mx + 'px';
                    image.style.top  = my + 'px';
                    setTimeout(() => { image.style.transition = ''; }, 200);
                }
            });
        }

        function onMove(e) {
            if (!currentDragged) return;
            currentDragged.style.left = (e.clientX - offsetX) + 'px';
            currentDragged.style.top  = (e.clientY - offsetY) + 'px';
        }

        function onUp() {
            if (!currentDragged) return;
            snapToMagnet(currentDragged);
            currentDragged = null;
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
        }

        document.querySelectorAll('.image').forEach(img => {
            img.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                e.preventDefault();

                currentDragged = e.currentTarget;
                const rect = currentDragged.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                currentDragged.style.zIndex = ++zIndexCounter;

                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            });

            let angle = 0;
            img.querySelector('.rotation-btn').addEventListener('click', e => {
                e.stopPropagation();
                angle += 90;
                img.style.transform = `rotate(${angle}deg)`;
            });
        });
    </script>

</body>
</html>
