<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaicos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand:       #F5EFE6;
    --clay:       #C9A97C;
    --terracotta: #A0522D;
    --indigo:     #1B2A4A;
    --teal:       #2C6E6A;
    --gold:       #D4A83A;
    --cream:      #FAF6EF;
    --dark:       #0e141c;
  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--sand);
    overflow-x: hidden;
  }

  #mosaic-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 90% at 50% 45%,
      transparent 0%,
      rgba(14,20,28,0.5) 50%,
      rgba(14,20,28,0.92) 100%);
    z-index: 1;
    pointer-events: none;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 1.8rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 400;
    letter-spacing: .1em;
    color: var(--cream);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: .72rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--clay);
    text-decoration: none;
    transition: color .25s;
  }
  .nav-links a:hover { color: var(--gold); }

  .hero {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    gap: 1.4rem;
  }

  .ornament {
    width: 52px;
    height: 1.5px;
    background: var(--gold);
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp .8s ease forwards .3s;
  }

  .eyebrow {
    font-weight: 200;
    font-size: clamp(.62rem, 1.3vw, .78rem);
    letter-spacing: .38em;
    text-transform: uppercase;
    color: var(--clay);
    opacity: 0;
    animation: fadeUp .8s ease forwards .5s;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4.5rem, 12vw, 10rem);
    line-height: .92;
    letter-spacing: -.01em;
    color: var(--cream);
    opacity: 0;
    animation: fadeUp 1s ease forwards .7s;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1rem, 2.4vw, 1.35rem);
    color: var(--clay);
    max-width: 400px;
    line-height: 1.75;
    opacity: 0;
    animation: fadeUp .8s ease forwards .95s;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp .8s ease forwards 1.1s;
  }
  .divider::before, .divider::after {
    content: '';
    display: block;
    width: 36px;
    height: 1px;
    background: var(--gold);
    opacity: .45;
  }
  .diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .cta-group {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp .8s ease forwards 1.25s;
    margin-top: .4rem;
  }

  .btn {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: .72rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    text-decoration: none;
    padding: .9rem 2.6rem;
    border-radius: 1px;
    transition: all .3s ease;
    cursor: pointer;
    border: none;
    display: inline-block;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--dark);
  }
  .btn-primary:hover {
    background: var(--clay);
    color: var(--cream);
    transform: translateY(-2px);
  }

  .btn-outline {
    background: transparent;
    color: var(--sand);
    border: 1px solid rgba(212,168,58,.35);
  }
  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
  }

  .scroll-hint {
    position: fixed;
    bottom: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp .8s ease forwards 1.7s;
  }
  .scroll-hint span {
    font-size: .58rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--clay);
    opacity: .7;
  }
  .scroll-line {
    width: 1px;
    height: 38px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: pulse 2s ease-in-out infinite;
  }

  .features {
    position: relative;
    z-index: 2;
    padding: 8rem 2rem 6rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 3rem;
    max-width: 860px;
    margin: 0 auto;
  }

  .feature {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .9rem;
  }

  .feature-icon { width: 44px; height: 44px; opacity: .85; }

  .feature h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--cream);
    letter-spacing: .03em;
  }

  .feature p {
    font-weight: 200;
    font-size: .83rem;
    line-height: 1.85;
    color: var(--clay);
    max-width: 200px;
  }

  footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid rgba(201,169,124,.1);
  }
  footer p {
    font-size: .65rem;
    letter-spacing: .22em;
    color: var(--terracotta);
    opacity: .45;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { opacity: .35; }
    50%      { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="mosaic-canvas"></canvas>
<div class="overlay"></div>

<main>
  <section class="hero">
    <div class="ornament"></div>
    <h1>Mo<em>sai</em>cos</h1>
    <div class="divider"><div class="diamond"></div></div>
    <div class="cta-group">
      <a class="btn btn-outline" href="a.html">Começar</a>
    </div>
  </section>

<script>
(function () {
  const canvas = document.getElementById('mosaic-canvas');
  const ctx    = canvas.getContext('2d');

  // Paleta: [r, g, b, alpha-max]
  const PALETTE = [
    [27,  42,  74, 0.80],  // indigo
    [44, 110, 106, 0.70],  // teal
    [160, 82,  45, 0.60],  // terracota
    [212,168,  58, 0.45],  // ouro
    [201,169, 124, 0.28],  // argila
    [14,  20,  28, 0.85],  // escuro
  ];

  let W, H, tiles = [];

  /* ── helpers de polígono ── */
  function poly(cx, cy, n, r, rot) {
    const p = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 / n) * i + rot;
      p.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }
    return p;
  }
  function star(cx, cy, n, R, ri, rot) {
    const p = [];
    for (let i = 0; i < n * 2; i++) {
      const a = (Math.PI / n) * i + rot;
      const rr = i % 2 === 0 ? R : ri;
      p.push([cx + rr * Math.cos(a), cy + rr * Math.sin(a)]);
    }
    return p;
  }
  function diamond(cx, cy, rx, ry) {
    return [[cx, cy - ry],[cx + rx, cy],[cx, cy + ry],[cx - rx, cy]];
  }

  const SHAPES = ['hex','hex','hex','diamond','tri','star','square'];

  function buildTiles() {
    tiles = [];
    // Grid hexagonal
    const s  = Math.max(W, H) / 10;
    const dx = s;
    const dy = s * 0.866;
    const cols = Math.ceil(W / dx) + 3;
    const rows = Math.ceil(H / dy) + 3;

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const ox = (row % 2) * dx * .5;
        const cx = col * dx + ox;
        const cy = row * dy;

        const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        const r     = s * (.22 + Math.random() * .2);
        const rot   = Math.random() * Math.PI;
        const ci    = Math.floor(Math.random() * PALETTE.length);
        const [ri, gi, bi, aMax] = PALETTE[ci];

        // delay pelo diagonal: peças do centro aparecem primeiro
        const nx = cx / W - .5, ny = cy / H - .5;
        const dist = Math.sqrt(nx * nx + ny * ny);
        const delay = dist * 2.5 + Math.random() * .4;

        tiles.push({
          cx, cy, r, shape, rot,
          ri, gi, bi, aMax,
          delay,
          progress: 0,
          speed: .009 + Math.random() * .007,
          strokeAlpha: .15 + Math.random() * .25,
        });
      }
    }
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildTiles();
  }

  function drawPoly(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
  }

  function drawTile(tile, tsec) {
    const { cx, cy, r, shape, rot, ri, gi, bi, aMax, progress, strokeAlpha } = tile;
    if (progress <= 0) return;

    const p  = Math.min(progress, 1);
    const e  = 1 - Math.pow(1 - p, 3);  // ease-out cubic
    const sc = .3 + e * .7;
    const al = aMax * e;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot + (1 - e) * .8);
    ctx.scale(sc, sc);
    ctx.translate(-cx, -cy);

    ctx.fillStyle   = `rgba(${ri},${gi},${bi},${al})`;
    ctx.strokeStyle = `rgba(212,168,58,${strokeAlpha * e})`;
    ctx.lineWidth   = .7;

    let pts;
    switch (shape) {
      case 'hex':     pts = poly(cx, cy, 6, r, 0); break;
      case 'tri':     pts = poly(cx, cy, 3, r, rot); break;
      case 'star':    pts = star(cx, cy, 6, r, r * .45, rot); break;
      case 'square':  pts = poly(cx, cy, 4, r, Math.PI / 4); break;
      default:        pts = diamond(cx, cy, r * .7, r);
    }

    drawPoly(pts);
    ctx.fill();
    ctx.stroke();

    // detalhe interno hexágono
    if (shape === 'hex' && e > .55) {
      ctx.strokeStyle = `rgba(212,168,58,${.07 * e})`;
      ctx.lineWidth = .35;
      drawPoly(poly(cx, cy, 6, r * .5, Math.PI / 6));
      ctx.stroke();
    }

    ctx.restore();
  }

  let last = 0;
  function loop(ts) {
    const dt = Math.min((ts - last) / 1000, .05);
    last = ts;
    const tsec = ts / 1000;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0e141c';
    ctx.fillRect(0, 0, W, H);

    for (const tile of tiles) {
      const elapsed = tsec - tile.delay;
      if (elapsed > 0 && tile.progress < 1) {
        tile.progress += tile.speed;
      }
      drawTile(tile, tsec);
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
