<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdf6ec;
            font-family: 'Fredoka One', 'Arial Rounded MT Bold', sans-serif;
        }

        /* Peças decorativas de fundo */
        .deco {
            position: fixed;
            border-radius: 6px;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Centro da tela */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* Título */
        .title {
            text-align: center;
        }

        .title h1 {
            font-size: clamp(44px, 8vw, 72px);
            color: #3a2a1e;
            line-height: 1;
            letter-spacing: 1px;
        }

        .title p {
            font-size: clamp(16px, 3vw, 22px);
            color: #a07850;
            margin-top: 6px;
        }

        /* Grade de pecinhas */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, clamp(44px, 7vw, 60px));
            grid-template-rows: repeat(3, clamp(44px, 7vw, 60px));
            gap: 5px;
        }

        .tile {
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .tile:hover { transform: scale(1.1) rotate(5deg); }

        .tile.empty {
            background: #e8ddd0;
            border: 3px dashed #c4ae96;
            animation: pulse-empty 1.6s ease-in-out infinite;
        }

        @keyframes pulse-empty {
            0%, 100% { opacity: 0.45; }
            50%       { opacity: 1; }
        }

        /* Botão */
        .start-btn {
            font-family: 'Fredoka One', 'Arial Rounded MT Bold', sans-serif;
            font-size: clamp(22px, 4vw, 30px);
            color: #fff;
            background-color: #e8863a;
            border: none;
            border-radius: 50px;
            padding: 16px 60px;
            cursor: pointer;
            border-bottom: 5px solid #b85e1a;
            transition: transform 0.12s ease, border-bottom-width 0.12s ease;
        }

        .start-btn:hover  { transform: translateY(-3px) scale(1.04); }
        .start-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* Estrelas decorativas */
        .stars {
            display: flex;
            gap: 12px;
        }

        .stars span {
            font-size: 24px;
            color: #f5c842;
            animation: float 2s ease-in-out infinite;
        }

        .stars span:nth-child(2) { animation-delay: 0.35s; }
        .stars span:nth-child(3) { animation-delay: 0.7s;  }

        @keyframes float {
            0%, 100% { transform: translateY(0);    }
            50%       { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <!-- Peças decorativas espalhadas -->
    <div class="deco" style="width:42px;height:42px;background:#f0997b;top:6%;left:5%;transform:rotate(18deg);"></div>
    <div class="deco" style="width:28px;height:28px;background:#5DCAA5;top:13%;left:15%;transform:rotate(-10deg);"></div>
    <div class="deco" style="width:48px;height:48px;background:#FAC775;top:5%;right:8%;transform:rotate(-22deg);"></div>
    <div class="deco" style="width:32px;height:32px;background:#AFA9EC;top:20%;right:18%;transform:rotate(12deg);"></div>
    <div class="deco" style="width:38px;height:38px;background:#85B7EB;bottom:14%;left:6%;transform:rotate(30deg);"></div>
    <div class="deco" style="width:26px;height:26px;background:#ED93B1;bottom:22%;left:18%;transform:rotate(-8deg);"></div>
    <div class="deco" style="width:42px;height:42px;background:#97C459;bottom:8%;right:7%;transform:rotate(-16deg);"></div>
    <div class="deco" style="width:28px;height:28px;background:#f0997b;bottom:24%;right:20%;transform:rotate(25deg);"></div>
    <div class="deco" style="width:22px;height:22px;background:#FAC775;top:42%;left:3%;transform:rotate(10deg);"></div>
    <div class="deco" style="width:20px;height:20px;background:#5DCAA5;top:58%;right:4%;transform:rotate(-30deg);"></div>

    <div class="stage">

        <div class="title">
            <h1>Mosaicos</h1>
        </div>

        <div class="puzzle-grid" aria-hidden="true">
            <div class="tile" style="background:#F0997B;"></div>
            <div class="tile" style="background:#FAC775;"></div>
            <div class="tile" style="background:#97C459;"></div>
            <div class="tile" style="background:#5DCAA5;"></div>
            <div class="tile empty"></div>
            <div class="tile" style="background:#AFA9EC;"></div>
            <div class="tile" style="background:#85B7EB;"></div>
            <div class="tile" style="background:#ED93B1;"></div>
            <div class="tile" style="background:#FAC775;"></div>
        </div>

        <button class="start-btn" onclick="window.location.href='./a1.html'">
            vamos lá!
        </button>

        <div class="stars" aria-hidden="true">
            <span>★</span>
            <span>★</span>
            <span>★</span>
        </div>

    </div>

</body>
</html>
